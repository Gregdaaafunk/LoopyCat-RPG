name: LoopyCatRuntimePrototype
options:
  deploymentTarget:
    iOS: "16.0"
targets:
  LoopyCatRuntimePrototype:
    type: application
    platform: iOS
    sources:
      - LoopyCatRuntimePrototype
    resources:
      - ../../03_AR/canonical_marker.jpg
      - ../../03_AR/ARC
      - ../../Asset
      - ../../04_Content/Bosses/raw_sheets
      - ../../04_Content/Loot/raw_sheets
    info:
      path: LoopyCatRuntimePrototype/Info.plist
      properties:
        CFBundleDisplayName: LoopyCat Runtime Prototype
        CFBundleIconName: AppIcon
        NSCameraUsageDescription: LoopyCat RPG AR needs camera access to test camera battle composition.
        NSPhotoLibraryAddUsageDescription: LoopyCat RPG AR saves composed battle photos to Photos.
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.loopycat.runtimeprototype
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
